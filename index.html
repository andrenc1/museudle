<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseuDle - História da Computação</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="museum-header">
        <h1>MuseuDle</h1>
        <p>Adivinhe o artefato da História da Computação!</p>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">Itens Disponíveis</div>
            <ul id="available-items-list"></ul>
        </aside>

        <main class="game-container">
        <div class="input-section">
            <input type="text" id="guess-input" list="guess-datalist" placeholder="Digite seu palpite..." autocomplete="off">
            <datalist id="guess-datalist"></datalist>
            <button id="submit-btn" class="interactive-btn">Adivinhar</button>
        </div>

        <div class="legend-container">
            <div class="legend-item"><span class="legend-box verde"></span> Correto</div>
            <div class="legend-item"><span class="legend-box amarelo"></span> Parcial</div>
            <div class="legend-item"><span class="legend-box cinza"></span> Incorreto</div>
            <div class="legend-item"><span class="legend-box font-icon">⬆️⬇️</span> Dica de Ano</div>
        </div>

        <div class="table-header">
            <span>Nome</span>
            <span>Categoria</span>
            <span>Ano</span>
            <span>Criador/Empresa</span>
        </div>
        
        <div id="guesses-grid" class="guesses-grid">
            <!-- Palpites aparecerão aqui -->
        </div>

        <div id="game-over-modal" class="hidden">
            <div class="modal-content">
                <div id="modal-primary-content">
                    <h2 id="modal-title"></h2>
                    <p id="modal-message"></p>
                    <div class="daily-countdown">Próximo artefato em: <span id="countdown"></span></div>
                    <button id="saiba-mais-btn" class="interactive-btn" style="background-color: var(--verde); margin-bottom: 10px; width: 100%;">Saiba Mais</button>
                    <button id="close-modal-btn" class="interactive-btn">Fechar</button>
                </div>
                <div id="modal-secondary-content" class="hidden">
                    <h3 id="info-nome" style="color: var(--text-color); margin-top: 0; margin-bottom: 1rem;"></h3>
                    <p><strong>Categoria:</strong> <span id="info-categoria"></span></p>
                    <p><strong>Ano:</strong> <span id="info-ano"></span></p>
                    <p><strong>Criador/Empresa:</strong> <span id="info-criador"></span></p>
                    <a id="info-search-link" href="#" target="_blank" class="interactive-btn" style="display:block; margin: 15px 0; background-color: var(--amarelo); text-decoration: none; color: white; padding: 10px;">Pesquisar no Google</a>
                    <button id="back-modal-btn" class="interactive-btn" style="width: 100%;">Voltar</button>
                </div>
            </div>
        </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
